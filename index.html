<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Luso - Classificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">Mercado Luso</h1>
        <div class="flex gap-2">
            <button id="btn-login" onclick="loginGoogle()" class="bg-white text-blue-600 px-3 py-1 rounded-lg text-sm font-bold shadow">Entrar com Google</button>
            <button onclick="openModal()" class="p-1">⚙️</button>
        </div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="bg-white p-3 rounded shadow-sm max-w-md border-l-4 border-blue-500">
            Olá! Eu sou a IA do Mercado Luso. Faça login e configure sua chave para começarmos!
        </div>
    </main>

    <footer class="p-4 bg-white border-t flex gap-2">
        <input type="text" id="user-input" placeholder="Pergunte sobre um produto ou anuncie..." class="flex-1 border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Enviar</button>
    </footer>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm">
            <h3 class="font-bold mb-4">Configurações</h3>
            <label class="text-xs text-gray-500">Gemini API Key:</label>
            <input type="password" id="api-key" placeholder="AIzaSy..." class="border p-2 w-full mb-4 rounded">
            <button onclick="saveKey()" class="bg-blue-600 text-white w-full py-2 rounded-lg font-bold">Salvar Chave</button>
            <button onclick="closeModal()" class="w-full text-xs mt-4 text-gray-400">Cancelar</button>
        </div>
    </div>

    <script>
        // --- PREENCHA AQUI COM OS DADOS DO SEU FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDLsyKfjDV0NgogTm2NJQ1i0oEVDlE9c-4", 
            authDomain: "mercado-luso.firebaseapp.com",
            projectId: "mercado-luso",
            appId: "1:75749849081:web:ed6ebee1fbc899ff0aef28"
        };
        
        firebase.initializeApp(firebaseConfig);

        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                document.getElementById('btn-login').innerText = "Olá, " + result.user.displayName.split(' ')[0];
                alert("Logado como: " + result.user.displayName);
            }).catch((error) => alert("Erro: " + error.message));
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function saveKey() {
            const key = document.getElementById('api-key').value;
            if(key) {
                localStorage.setItem('gemini_key', key);
                alert("Chave salva localmente!");
                closeModal();
            }
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="text-right"><span class="bg-blue-500 text-white p-2 rounded-lg inline-block shadow-sm">${input.value}</span></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
